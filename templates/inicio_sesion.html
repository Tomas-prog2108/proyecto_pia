<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/css/inicio_sesion.css">
<script src="/static/js/inicio_sesion.js" defer></script>
<title>Horas que cuentan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="particles"></canvas>
 
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
 
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Modo claro</button>
 
<!-- ==================== PANTALLA 1: LOGIN ESTUDIANTE ==================== -->
<div class="screen active" id="loginScreen">
  <div class="login-card">
 

    <div class="school-badge">
      <div class="badge-icon">JL</div>
      <span class="school-name">Horas que cuentan</span>
      <span class="school-sub">Sistema de Registro</span>
    </div>
 
    <h1 class="login-title">Bienvenidos</h1>
    <p class="login-sub">Ingresa con tu documento y contrasena</p>

    <div class="input-group">

      <form action="/login" method="post">

        <label for="documento">Documento de identidad</label>
        <input type="text" id="TI" name="documento" required placeholder="Documento de identidad" autocomplete="off">

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Contraseña">

        <button class="btn-primary" type="submit">Ingresar</button>

      </form>

    </div>

    
 

<!-- ==================== PANTALLA 2: LOGIN ADMINISTRADOR (SECRETARIA) ==================== -->
<div class="screen" id="adminLoginScreen">
  <div class="secretaria-card">
 
    <h2 class="secretaria-title">Agregar usuario</h2>
    <p class="secretaria-sub">Solo personal autorizado de la institucion</p>
 
    <div class="input-group">
      <label>Usuario</label>
      <input type="text" id="adminUser" placeholder="Usuario administrativo">
    </div>
 
    <div class="input-group">
      <label>Contrasena</label>
      <input type="password" id="adminPass" placeholder="Contrasena">
      <!-- La contrasena correcta es: javiera2025 -->
    </div>
 
    <button class="btn-primary" onclick="loginAdmin()">Entrar</button>
 
    <button class="btn-back" onclick="showScreen('loginScreen')">Volver al inicio</button>
  </div>
</div>



</body>
</html>
